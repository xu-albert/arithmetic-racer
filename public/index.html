<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arithmetic Racer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style-a.css" />
  <script type="importmap">
    {
      "imports": {
        "partysocket": "/vendor/partysocket/index.js"
      }
    }
  </script>
</head>
<body>
  <div class="beta-banner" role="note">
    <strong>Alpha</strong> — solo only, multiplayer and other core functionality coming soon.
  </div>
  <header class="app-header">
    <h1>Arithmetic Racer</h1>
    <p class="tagline">Return to a time when you were a gifted child.</p>
  </header>

  <main id="app">
    <section id="lobby" class="screen">
      <h2>Lobby</h2>
      <div class="difficulty-picker">
        <button class="diff-btn" data-difficulty="easy">Easy</button>
        <button class="diff-btn" data-difficulty="medium">Medium</button>
        <button class="diff-btn" data-difficulty="hard">Hard</button>
      </div>
      <div class="lobby-actions">
        <button id="quickplay-btn" class="primary">Quickplay</button>
        <button id="create-room-btn">Create Private Room</button>
      </div>
    </section>

    <section id="lobby-room" class="screen hidden">
      <h2 id="room-title">Room</h2>
      <button id="invite-btn" class="link-button">Invite people</button>

      <div class="room-config">
        <div class="difficulty-picker">
          <button class="diff-btn" data-difficulty="easy">Easy</button>
          <button class="diff-btn" data-difficulty="medium">Medium</button>
          <button class="diff-btn" data-difficulty="hard">Hard</button>
        </div>
        <label class="race-length-label">
          Race length
          <input id="race-length-input" type="number" min="5" max="50" value="20" />
        </label>
      </div>

      <h3 class="players-heading">Who's here</h3>
      <ul id="room-players"></ul>

      <div class="room-actions">
        <button id="start-race-btn" class="primary" disabled>Start Race</button>
        <button id="rematch-btn" class="primary hidden">Race Again</button>
        <button id="leave-room-btn" class="link-button">Leave</button>
      </div>

      <p id="lobby-hint" class="lobby-hint"></p>
    </section>

    <div id="invite-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="invite-modal-title">
      <div class="modal-card">
        <h3 id="invite-modal-title">Invite people to this race</h3>
        <p>Share this URL:</p>
        <input id="invite-url" type="text" readonly />
        <div class="modal-actions">
          <button id="invite-copy-btn">Copy</button>
          <button id="invite-close-btn">Done</button>
        </div>
      </div>
    </div>

    <section id="race" class="screen hidden">
      <div id="countdown" class="hidden" aria-live="polite"></div>
      <div id="finish-banner" class="hidden" aria-live="polite">
        <div class="finish-banner-place"></div>
        <div class="finish-banner-time"></div>
      </div>
      <div id="problem-viewport">
        <div id="problem-queue" aria-label="Problem queue"></div>
      </div>
      <input
        type="number"
        id="answer-input"
        autocomplete="off"
        inputmode="numeric"
        placeholder="answer"
      />
      <div id="track" class="track">
        <!-- Lanes injected by ui.js -->
      </div>
      <div id="hud">
        <span id="score">0 / 20</span>
        <button id="quit-race-btn" class="link-button">Quit race</button>
      </div>
    </section>

    <section id="results" class="screen hidden">
      <h2>Race over</h2>
      <ol id="podium"></ol>
      <button id="play-again-btn">Play again</button>
    </section>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
