<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset password — Arithmetic Racer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Quicksand:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style-a.css" />
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/reset-password.css" />
  </head>
  <body>
    <!-- Match the main app shell so the reset page doesn't feel like a different site. -->
    <div class="beta-banner" role="note">
      <strong>Alpha</strong> — solo only, multiplayer and other core
      functionality coming soon.
    </div>
    <!-- Static header strip. We don't mount header.js here because this is a
         one-shot landing without a session yet — no /api/me to fetch, no
         pills to populate. Just the brand for visual continuity. -->
    <header class="hdr hdr--static">
      <div class="hdr__brand">Arithmetic Racer</div>
    </header>

    <main class="reset-card" role="main">
      <h1>Reset your password</h1>
      <form id="reset-form" novalidate>
        <label>
          New password
          <input
            type="password"
            id="new-password"
            name="new-password"
            minlength="8"
            autocomplete="new-password"
            required
          />
        </label>
        <label>
          Confirm
          <input
            type="password"
            id="confirm-password"
            name="confirm-password"
            minlength="8"
            autocomplete="new-password"
            required
          />
        </label>
        <button type="submit">Set new password</button>
        <p class="reset-error" id="reset-error" role="alert" hidden></p>
      </form>
      <div class="reset-success" id="reset-success" hidden>
        <p class="reset-success-msg">Your password has been updated.</p>
        <a href="/" class="reset-home-btn">Go to homescreen</a>
      </div>
    </main>
    <script type="module">
      // POSTs to better-auth's reset-password endpoint with { token, newPassword }.
      // Verified against better-auth 1.6.9: the route is /api/auth/reset-password
      // (NOT /api/auth/forget-password — that one is the request-reset endpoint
      // which is /api/auth/request-password-reset in 1.6.9).
      const params = new URLSearchParams(location.search);
      const token = params.get("token");
      const form = document.getElementById("reset-form");
      const errEl = document.getElementById("reset-error");
      const okEl = document.getElementById("reset-success");

      function showError(msg) {
        errEl.textContent = msg;
        errEl.hidden = false;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errEl.hidden = true;

        const a = document.getElementById("new-password").value;
        const b = document.getElementById("confirm-password").value;
        if (a.length < 8) {
          showError("Password must be at least 8 characters.");
          return;
        }
        if (a !== b) {
          showError("Passwords don't match.");
          return;
        }
        if (!token) {
          showError("Missing or invalid reset token.");
          return;
        }

        let res;
        try {
          res = await fetch("/api/auth/reset-password", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ token, newPassword: a }),
          });
        } catch {
          showError("Network error. Please try again.");
          return;
        }
        if (!res.ok) {
          showError("Reset failed. The link may have expired.");
          return;
        }
        form.hidden = true;
        okEl.hidden = false;
      });
    </script>
  </body>
</html>
