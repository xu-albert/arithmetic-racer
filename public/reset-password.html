<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset password — Arithmetic Racer</title>
    <link rel="stylesheet" href="style-a.css" />
    <link rel="stylesheet" href="css/reset-password.css" />
  </head>
  <body>
    <main class="reset-card" role="main">
      <h1>Reset your password</h1>
      <form id="reset-form" novalidate>
        <label>
          New password
          <input
            type="password"
            id="new-password"
            name="new-password"
            minlength="8"
            autocomplete="new-password"
            required
          />
        </label>
        <label>
          Confirm
          <input
            type="password"
            id="confirm-password"
            name="confirm-password"
            minlength="8"
            autocomplete="new-password"
            required
          />
        </label>
        <button type="submit">Set new password</button>
        <p class="reset-error" id="reset-error" role="alert" hidden></p>
        <p class="reset-success" id="reset-success" hidden>
          Password updated. <a href="/">Go to lobby &rarr;</a>
        </p>
      </form>
    </main>
    <script type="module">
      // POSTs to better-auth's reset-password endpoint with { token, newPassword }.
      // Verified against better-auth 1.6.9: the route is /api/auth/reset-password
      // (NOT /api/auth/forget-password — that one is the request-reset endpoint
      // which is /api/auth/request-password-reset in 1.6.9).
      const params = new URLSearchParams(location.search);
      const token = params.get("token");
      const form = document.getElementById("reset-form");
      const errEl = document.getElementById("reset-error");
      const okEl = document.getElementById("reset-success");

      function showError(msg) {
        errEl.textContent = msg;
        errEl.hidden = false;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errEl.hidden = true;

        const a = document.getElementById("new-password").value;
        const b = document.getElementById("confirm-password").value;
        if (a.length < 8) {
          showError("Password must be at least 8 characters.");
          return;
        }
        if (a !== b) {
          showError("Passwords don't match.");
          return;
        }
        if (!token) {
          showError("Missing or invalid reset token.");
          return;
        }

        let res;
        try {
          res = await fetch("/api/auth/reset-password", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ token, newPassword: a }),
          });
        } catch {
          showError("Network error. Please try again.");
          return;
        }
        if (!res.ok) {
          showError("Reset failed. The link may have expired.");
          return;
        }
        form.hidden = true;
        okEl.hidden = false;
      });
    </script>
  </body>
</html>
